name: procropper_pdf
description: "ProCropper PDF，基于 Flutter 的 PDF 裁切工具。"
publish_to: 'none'
version: 0.2.0

environment:
  sdk: ^3.11.5

dependencies:
  desktop_drop: ^0.7.1
  file_picker: ^11.0.2
  flutter:
    sdk: flutter
  flutter_acrylic: ^1.1.4
  flutter_localizations:
    sdk: flutter
  hive: ^2.2.3
  image: ^4.9.1
  package_info_plus: ^8.0.2
  path: ^1.9.1
  path_provider: ^2.1.6
  pdfrx: ^2.4.4
  settings_ui: ^2.0.2
  share_plus: ^12.0.2
  syncfusion_flutter_pdf: ^33.2.13+1
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.17.0
  flutter_launcher_icons: ^0.14.4

msix_config:
  store: true
  display_name: ProCropper PDF
  publisher_display_name: 遥遥紫荆
  identity_name: genryopicture.ProCropperPDF
  publisher: CN=F2F54CF4-B104-48F4-AF36-4351B9E66834
  msix_version: 0.2.0.0
  logo_path: assets/branding/app_icon/app_icon_1024.png
  architecture: x64
  languages: en-us, zh-cn
  file_extension: .pdf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/branding/app_icon/app_icon_1024.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/branding/app_icon/app_icon_1024.png"
    icon_size: 96
  macos:
    generate: true
    image_path: "assets/branding/app_icon/app_icon_1024.png"

flutter:
  uses-material-design: true
